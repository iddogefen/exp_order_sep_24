<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 120px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
      .transition-square { 
          width: 250px; height: 250px; margin: 0 auto; 
          display: flex; align-items: center; justify-content: center;
          font-family: Arial; font-size: 32px; font-weight: bold; border-radius: 15px;
      }
      .bg-story { background-color: #ffcccb; color: #8b0000; } 
      .bg-info { background-color: #add8e6; color: #00008b; }  
      .value-tag { font-size: 32px; font-weight: bold; margin-top: 20px; font-family: Arial; }
      .val-high { color: green; }
      .val-low { color: gray; }
    </style>
    <title>Story vs Facts Experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-html-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        jsPsych.data.get().localSave('csv', 'experiment_data.csv');
    }
});

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

// --- הגדרת סדרות (Story vs Fact) ---
var story_nums = jsPsych.randomization.shuffle([1, 2]);
var info_nums = jsPsych.randomization.shuffle([3, 4]);

var all_blocks = [
    { name: 'story_' + story_nums[0], type: 'story', is_valuable: true }, 
    { name: 'story_' + story_nums[1], type: 'story', is_valuable: false },
    { name: 'info_' + info_nums[0], type: 'info', is_valuable: true },
    { name: 'info_' + info_nums[1], type: 'info', is_valuable: false }
];

function getImagePath(prefix, i, version = 'b') {
    return `images_story_vs_info/${prefix}_${i}${i===6 ? '_'+version : ''}.png`;
}

// 1. PRELOAD
timeline.push({ type: jsPsychPreload, auto_preload: true });
timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

// 2. פתיחה והסכמה
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<h2>Welcome to the experiment</h2><p>Please read the instructions carefully before each part.</p>',
        '<p>By clicking "Next", you agree to participate in this study.</p>'
    ],
    show_clickable_nav: true
});

// ----------- הוראות לחלק 1 -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<h2>Part 1: Observation Phase</h2>' +
        '<p>In this part, you will see 4 different sequences of images.</p>' +
        '<p>Some sequences represent a <b>Story</b>, while others represent a list of <b>Facts</b>.</p>' +
        '<p>Before each sequence, a screen will show you whether it is a "Story" or "Facts".</p>' +
        '<p><b>Your task:</b> Observe the images and answer periodic questions about them.</p>'
    ],
    show_clickable_nav: true
});

// שלב 1: צפייה
var observation_order = jsPsych.randomization.shuffle(all_blocks);
observation_order.forEach(function(block) {
    var label = block.type === 'story' ? 'STORY' : 'FACTS';
    var cssClass = block.type === 'story' ? 'bg-story' : 'bg-info';

    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div class="transition-square ${cssClass}"><div>${label}</div></div>`,
        choices: "NO_KEYS", 
        trial_duration: 2000 
    });

    for (var i = 1; i <= 5; i++) {
        var path = getImagePath(block.name, i);
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"></div>`,
            choices: "NO_KEYS", 
            trial_duration: 3000 
        });

        // שאלות ערנות רנדומליות (75% סוג תוכן, 25% אדם)
        var rand = Math.random();
        var question = rand < 0.75 ? "Is this part of a Story or Facts?" : "Is there a person in this image?";
        var choices = rand < 0.75 ? ['Story', 'Facts'] : ['Yes', 'No'];

        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold;">${question}</p></div></div>`,
            choices: choices,
            data: { task: 'observation', block_type: block.type, img_idx: i }
        });
    }
});

// ----------- הוראות לחלק 2 -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<h2>Part 2: Value Discovery Phase</h2>' +
        '<p>Now you will see the <b>final outcome</b> of each sequence (the 6th image).</p>' +
        '<p>For each sequence, we will reveal how much money it is worth: <b>$100</b> or <b>$0</b>.</p>' +
        '<p>Please try to remember which sequences are valuable and which are not.</p>'
    ],
    show_clickable_nav: true
});

// שלב 2: למידה
all_blocks.forEach(function(block) {
    var path6 = getImagePath(block.name, 6, block.is_valuable ? 'a' : 'b');
    var val_text = block.is_valuable ? "$100" : "$0";
    var val_class = block.is_valuable ? "val-high" : "val-low";

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><p>Outcome for the <b>${block.type}</b>:</p><img src="${path6}" class="exp-image"><div class="value-tag ${val_class}">Value: ${val_text}</div></div>`,
        choices: ['Continue'],
        on_load: function() {
            var btn = document.querySelector('.jspsych-btn');
            btn.disabled = true;
            setTimeout(() => { btn.disabled = false; }, 4000);
        }
    });
});

// ----------- הוראות לחלק 3 -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<h2>Part 3: Choice Phase</h2>' +
        '<p>This is the final and most important part.</p>' +
        '<p>You will see pairs of images. One is from a sequence you saw earlier, and the other is from a different sequence.</p>' +
        '<p><b>Your task:</b> Choose the image that you think belongs to a sequence worth <b>MORE MONEY</b>.</p>' +
        '<p>Correct choices will increase your bonus reward!</p>'
    ],
    show_clickable_nav: true
});

// שלב 3: בחירה (14 שלבים: 12 השוואות + 2 בדיקות ערנות)
var comparison_pairs = [];
[1, 2, 3, 4, 5, 6].forEach(idx => {
    // השוואות סיפור מול עובדה
    comparison_pairs.push({ img1: getImagePath(all_blocks[0].name, idx), img2: getImagePath(all_blocks[2].name, idx), type: 'choice' });
    comparison_pairs.push({ img1: getImagePath(all_blocks[1].name, idx), img2: getImagePath(all_blocks[3].name, idx), type: 'choice' });
});
// 2 בדיקות ערנות (6a מול 6b)
comparison_pairs.push({ img1: getImagePath(all_blocks[0].name, 6, 'a'), img2: getImagePath(all_blocks[0].name, 6, 'b'), type: 'attention' });
comparison_pairs.push({ img1: getImagePath(all_blocks[2].name, 6, 'a'), img2: getImagePath(all_blocks[2].name, 6, 'b'), type: 'attention' });

jsPsych.randomization.shuffle(comparison_pairs).forEach(function(t) {
    var left_first = Math.random() < 0.5;
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="font-family: Arial; margin-bottom: 20px;"><h3>Which is worth <b>more money</b>?</h3></div>
            <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                <img src="${left_first ? t.img1 : t.img2}" class="small-image">
                <img src="${left_first ? t.img2 : t.img1}" class="small-image">
            </div>`,
        choices: ['Left', 'Right'],
        data: { task: 'final_choice', type: t.type }
    });
});

// שאלון סופי
timeline.push({
    type: jsPsychSurveyText,
    questions: [
        {prompt: "Did you notice any connection between the Story/Fact type and the value? Please explain.", name: 'causal_link', required: true}
    ]
});

jsPsych.run(timeline);
</script>
</html>
