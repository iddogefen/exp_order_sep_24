<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 120px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
      
      /* עיצוב ריבועי המעבר בין סוגי התוכן */
      .transition-square { 
          width: 250px; height: 250px; margin: 0 auto; 
          display: flex; align-items: center; justify-content: center;
          font-family: Arial; font-size: 32px; font-weight: bold; border-radius: 15px;
      }
      .bg-story { background-color: #ffcccb; color: #8b0000; } /* אדום בהיר לסיפור */
      .bg-info { background-color: #add8e6; color: #00008b; }  /* כחול בהיר לעובדה */
      
      .value-tag { font-size: 32px; font-weight: bold; margin-top: 20px; font-family: Arial; }
      .val-high { color: green; }
      .val-low { color: gray; }
    </style>
    <title>Story vs Facts Experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-html-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        jsPsych.data.get().localSave('csv', 'my_data.csv');
    }
});

// --- הגדרת בלוקים (סיפורים מול עובדות) ---
var story_nums = jsPsych.randomization.shuffle([1, 2]);
var info_nums = jsPsych.randomization.shuffle([3, 4]);

var all_blocks = [
    { name: 'story_' + story_nums[0], type: 'story', is_valuable: true }, 
    { name: 'story_' + story_nums[1], type: 'story', is_valuable: false },
    { name: 'info_' + info_nums[0], type: 'info', is_valuable: true },
    { name: 'info_' + info_nums[1], type: 'info', is_valuable: false }
];

function getImagePath(prefix, i, version = 'b') {
    return `images_story_vs_info/${prefix}_${i}${i===6 ? '_'+version : ''}.png`;
}

// Preload
timeline = [];
timeline.push({
    type: jsPsychPreload,
    auto_preload: true
});

timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

// ----------- שלב 1: צפייה והבחנה בין סיפור לעובדה -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<h2>Part 1: Observation</h2><p>You will see sequences of images.</p>' +
        '<p>Some sequences tell a <b>Story</b>, while others present a list of <b>Facts</b>.</p>' +
        '<p>Please pay attention to the type of information and answer the questions that follow.</p>'
    ],
    show_clickable_nav: true
});

var observation_order = jsPsych.randomization.shuffle(all_blocks);

observation_order.forEach(function(block) {
    // מסך מעבר המגדיר את סוג הבלוק
    var label = block.type === 'story' ? 'STORY' : 'FACTS';
    var cssClass = block.type === 'story' ? 'bg-story' : 'bg-info';

    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div class="transition-square ${cssClass}"><div>${label}</div></div>`,
        choices: "NO_KEYS", 
        trial_duration: 2000 
    });

    for (var i = 1; i <= 5; i++) {
        var path = getImagePath(block.name, i);
        
        // הצגת התמונה ל-3 שניות
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"></div>`,
            choices: "NO_KEYS", 
            trial_duration: 3000 
        });

        // שאלת ערנות משתנה
        var rand = Math.random();
        var question, choices;
        
        if (rand < 0.75) { // 75% מהזמן שואלים על סוג התוכן
            question = "Is this part of a Story or a list of Facts?";
            choices = ['Story', 'Facts'];
        } else { // 25% מהזמן שואלים על אדם (כפי שהיה קודם)
            question = "Is there a person in the description or image?";
            choices = ['Yes', 'No'];
        }

        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold;">${question}</p></div></div>`,
            choices: choices,
            data: { task: 'observation', block_type: block.type, img_idx: i }
        });
    }
});

// ----------- שלב 2: למידת ערך (התוצאה) -----------
timeline.push({
    type: jsPsychInstructions,
    pages: ['<h2>Part 2: Value Discovery</h2><p>Now you will see the outcome (6th image) of each sequence and its monetary value.</p>'],
    show_clickable_nav: true
});

all_blocks.forEach(function(block) {
    var path6 = getImagePath(block.name, 6, block.is_valuable ? 'a' : 'b');
    var val_text = block.is_valuable ? "$100" : "$0";
    var val_class = block.is_valuable ? "val-high" : "val-low";

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><p>The outcome for the <b>${block.type}</b>:</p><img src="${path6}" class="exp-image"><div class="value-tag ${val_class}">Value: ${val_text}</div></div>`,
        choices: ['Continue'],
        on_load: function() {
            var btn = document.querySelector('.jspsych-btn');
            btn.disabled = true;
            setTimeout(() => { btn.disabled = false; }, 4000);
        }
    });
});

// ----------- שלב 3: בחירה בין 6 מול 6 (וכל שאר האינדקסים) -----------
timeline.push({
    type: jsPsychInstructions,
    pages: ['<h2>Part 3: Final Comparison</h2><p>Choose the image that you think belongs to a sequence worth <b>more money</b>.</p>'],
    show_clickable_nav: true
});

// הכנת צמדי השוואה
var choices = [];
[1,2,3,4,5,6].forEach(idx => {
    // השוואה בין הסיפור היקר לעובדה היקרה
    choices.push({img_a: getImagePath(all_blocks[0].name, idx), img_b: getImagePath(all_blocks[2].name, idx), type: 'high_val_comp'});
    // השוואה בין סיפור ניטרלי לעובדה ניטרלית
    choices.push({img_a: getImagePath(all_blocks[1].name, idx), img_b: getImagePath(all_blocks[3].name, idx), type: 'low_val_comp'});
});

jsPsych.randomization.shuffle(choices).forEach(function(t) {
    var left_is_a = Math.random() < 0.5;
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="font-family: Arial; margin-bottom: 20px;">
                <h3>Which image is worth <b>more money</b>?</h3>
                <p>Think back: Was this part of a <b>Story</b> or a <b>Fact</b>?</p>
            </div>
            <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                <img src="${left_is_a ? t.img_a : t.img_b}" class="small-image">
                <img src="${left_is_a ? t.img_b : t.img_a}" class="small-image">
            </div>`,
        choices: ['Left', 'Right'],
        data: { task: 'final_choice', img_idx: t.idx }
    });
});

// ----------- סיום -----------
timeline.push({
    type: jsPsychSurveyText,
    questions: [
        {prompt: "Did you feel that Stories or Facts were worth more? Why?", name: 'strategy', rows: 5},
        {prompt: "Are you seeing a connection between the value and the story/fact?", name: 'causal_link', required: true}
    ]
});

jsPsych.run(timeline);
</script>
</html>
