<!DOCTYPE html>
<html>
<head>
    <style>
        .hide_cursor { cursor: none; }
        .jspsych-btn { margin: 20px; padding: 10px 20px; font-size: 18px; }
        .stim-img { width: 300px; border: 2px solid #ccc; border-radius: 8px; }
        .choice-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
    </style>
    <title>Causal Memory Experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-image-keyboard-response.js"></script>
    <script src="jspsych/plugin-image-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <script src="Tools/Functions1.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
</head>
<body></body>
<script>
    const jsPsych = initJsPsych({
        on_finish: function() {
            jsPsych.data.get().localSave('csv', `subject_${subject_id}_results.csv`);
        }
    });

    const subject_id = jsPsych.data.getURLVariable('participantId') || "user_" + Math.floor(Math.random()*1000000);
    
    // Generating sequences (using your existing function)
    const groups = [{ name: "causal", n: 10, random: "false" }];
    const all_seq = getAllSequences(groups); 
    let timeline = [];

    // --- 1. PRELOAD & FULLSCREEN ---
    timeline.push({ type: jsPsychPreload, auto_preload: true });
    timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

    // --- 2. INSTRUCTIONS ---
    timeline.push({
        type: jsPsychInstructions,
        pages: [
            '<div style="font-size: 24px;">Welcome to the experiment.<br>You will view several sequences of images. Please observe them carefully.</div>',
            '<div style="font-size: 24px;">During the task, we will ask you brief questions to ensure you are paying attention.<br>Click "Next" to begin.</div>'
        ],
        show_clickable_nav: true,
        button_label_next: "Next"
    });

    // --- 3. PART 1: ENCODING (Image sequences + 75%/25% Attention Checks) ---
    all_seq.forEach((sequence, s_idx) => {
        const images = Array.isArray(sequence) ? sequence : sequence.images;

        images.forEach((img_path, i_idx) => {
            timeline.push({
                type: jsPsychImageKeyboardResponse,
                stimulus: img_path,
                choices: "NO_KEYS",
                trial_duration: 2000,
                data: { phase: 'encoding', sequence_index: s_idx, image_index: i_idx }
            });

            // Random Attention Checks during encoding
            let rand = Math.random();
            if (rand < 0.75) {
                // 75% Question: Story or Fact?
                timeline.push({
                    type: jsPsychImageButtonResponse,
                    stimulus: img_path,
                    choices: ['Story', 'Fact'],
                    prompt: "<p>Is this image part of a Story or a list of Facts?</p>",
                    data: { task: 'attention_type' }
                });
            } else {
                // 25% Question: Person?
                timeline.push({
                    type: jsPsychImageButtonResponse,
                    stimulus: img_path,
                    choices: ['Yes', 'No'],
                    prompt: "<p>Is there a person or a description of a person in this image?</p>",
                    data: { task: 'attention_person' }
                });
            }
        });
    });

    // --- 4. PART 2: VALUE CHOICE PHASE (14 Total Choices) ---
    timeline.push({
        type: jsPsychInstructions,
        pages: [
            '<div style="font-size: 24px;">Part 2: Value Comparison.<br>You will see two images. Please select the one you believe is worth <b>MORE MONEY</b>.</div>'
        ],
        show_clickable_nav: true,
        button_label_next: "Next"
    });

    /** * Logic for 14 trials:
     * - 12 Story vs Fact comparisons (using image 6 from different sequences)
     * - 2 Attention checks (6_a vs 6_b)
     */
    let choice_trials = [];

    // Adding 12 Story vs Fact Comparisons
    // (This assumes you have at least 12 pairs of images available/reused)
    for (let i = 0; i < 12; i++) {
        // Example: logic to select image 6 from a story seq and image 6 from a fact seq
        // Using placeholders - replace with your specific path logic
        choice_trials.push({
            img_left: `images/story_seq_${i}_img6.png`, 
            img_right: `images/fact_seq_${i}_img6.png`,
            type: 'choice_comparison'
        });
    }

    // Adding 2 Attention Checks (6_a vs 6_b)
    for (let i = 0; i < 2; i++) {
        choice_trials.push({
            img_left: `images/seq_${i}_img6_a.png`, // The "money" one
            img_right: `images/seq_${i}_img6_b.png`, // The "neutral" one
            type: 'attention_money_check',
            correct_img: `images/seq_${i}_img6_a.png`
        });
    }

    // Shuffle the 14 trials
    const shuffled_choices = jsPsych.randomization.shuffle(choice_trials);

    shuffled_choices.forEach((trial) => {
        const current_choices = jsPsych.randomization.shuffle([trial.img_left, trial.img_right]);
        
        timeline.push({
            type: jsPsychImageButtonResponse,
            stimulus: '',
            choices: current_choices,
            button_html: '<button class="jspsych-btn"><img src="%choice%" class="stim-img"/></button>',
            prompt: "<p style='font-size: 20px;'>Which image is worth <b>MORE MONEY</b>?</p>",
            data: { 
                task: trial.type,
                correct_img: trial.correct_img || null
            },
            on_finish: function(data) {
                if (data.correct_img) {
                    const choice_made = current_choices[data.response];
                    data.correct = (choice_made === data.correct_img);
                }
            }
        });
    });

    // --- 5. FINAL MANDATORY QUESTION ---
    timeline.push({
        type: jsPsychSurveyText,
        questions: [
            {
                prompt: "Did you notice any connection between the type of information (Story vs Fact) and the monetary value of the images? Please explain in detail.",
                rows: 5,
                columns: 60,
                required: true,
                name: 'causal_feedback'
            }
        ],
        button_label: "Complete Experiment",
        on_finish: function(data) {
            const val = data.response.causal_feedback;
            if (val.length < 10) {
                // Basic check to ensure they didn't just type one word
                alert("Please provide a more detailed explanation before finishing.");
            }
        }
    });

    jsPsych.run(timeline);
</script>
</html>
