<!DOCTYPE html>
<html>
<head>
    <title>Causal Memory Experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-image-keyboard-response.js"></script>
    <script src="jspsych/plugin-image-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <script src="Tools/Functions1.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
    <style>
        .jspsych-btn img { width: 300px; border: 2px solid #ccc; border-radius: 8px; transition: transform 0.2s; }
        .jspsych-btn:hover img { border-color: #007bff; transform: scale(1.05); }
    </style>
</head>
<body>
<script>
    const jsPsych = initJsPsych({
        on_finish: function() {
            // שמירה מקומית של הקובץ בסיום
            jsPsych.data.get().localSave('csv', `subject_${subject_id}.csv`);
        }
    });

    const subject_id = jsPsych.data.getURLVariable('participantId') || "user_" + Math.floor(Math.random()*1000000);
    
    // יצירת הרצפים (באמצעות הפונקציה הקיימת שלך)
    const groups = [{ name: "causal", n: 10, random: "false" }];
    const all_seq = getAllSequences(groups); 
    let timeline = [];

    // 1. טעינה מראש ומסך מלא
    timeline.push({ type: jsPsychPreload, auto_preload: true });
    timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

    // 2. הוראות (Instructions)
    timeline.push({
        type: jsPsychInstructions,
        pages: [
            'Welcome! You will view several sequences of images. Please observe them carefully.',
            'Occasionally, we will ask brief questions to ensure you are paying attention.'
        ],
        show_clickable_nav: true,
        button_label_next: "Next"
    });

    // 3. שלב הקידוד (Encoding) + שאלות ערנות (75% Story/Fact, 25% Person)
    all_seq.forEach((sequence, s_idx) => {
        const images = Array.isArray(sequence) ? sequence : sequence.images;

        images.forEach((img_path, i_idx) => {
            timeline.push({
                type: jsPsychImageKeyboardResponse,
                stimulus: img_path,
                choices: "NO_KEYS",
                trial_duration: 2000,
                data: { 
                    phase: 'encoding', 
                    sequence_index: s_idx, 
                    img_idx: i_idx + 1 
                }
            });

            // שאלות ערנות רנדומליות
            let rand = Math.random();
            if (rand < 0.75) {
                timeline.push({
                    type: jsPsychImageButtonResponse,
                    stimulus: img_path,
                    choices: ['Story', 'Fact'],
                    prompt: "<p>Is this image part of a Story or a Fact?</p>",
                    data: { task: 'attention_type' }
                });
            } else {
                timeline.push({
                    type: jsPsychImageButtonResponse,
                    stimulus: img_path,
                    choices: ['Yes', 'No'],
                    prompt: "<p>Is there a person in this image?</p>",
                    data: { task: 'attention_person' }
                });
            }
        });
    });

    // 4. שלב הבחירה (Value Choice) - סה"כ 14 שלבים
    timeline.push({
        type: jsPsychInstructions,
        pages: ['Select the image you believe is worth <b>MORE MONEY</b>.'],
        show_clickable_nav: true
    });

    let choice_trials = [];

    // א. 12 בחירות ישירות (תמונה 6 מול תמונה 6)
    for (let i = 1; i <= 6; i++) {
        // זוג ראשון
        choice_trials.push({
            left: `images_story_vs_info/story_${i}_6.png`, 
            right: `images_story_vs_info/info_${i}_6.png`,
            type: 'choice_comparison',
            comp_type: 'Valuable_Story_vs_Info'
        });
        // זוג שני (למשל רצפים אחרים או חזרה)
        choice_trials.push({
            left: `images_story_vs_info/story_${i+1}_6.png`, 
            right: `images_story_vs_info/info_${i+1}_6.png`,
            type: 'choice_comparison',
            comp_type: 'Neutral_Story_vs_Info'
        });
    }

    // ב. 2 בדיקות ערנות (6_a מול 6_b)
    choice_trials.push({
        left: `images_story_vs_info/story_1_6_a.png`, // התמונה הנכונה (כסף)
        right: `images_story_vs_info/story_1_6_b.png`,
        type: 'choice_comparison',
        is_attention: true,
        correct: `images_story_vs_info/story_1_6_a.png`
    });
    choice_trials.push({
        left: `images_story_vs_info/info_1_6_a.png`, // התמונה הנכונה (כסף)
        right: `images_story_vs_info/info_1_6_b.png`,
        type: 'choice_comparison',
        is_attention: true,
        correct: `images_story_vs_info/info_1_6_a.png`
    });

    // ערבוב של כל 14 הניסויים
    const shuffled_trials = jsPsych.randomization.shuffle(choice_trials);

    shuffled_trials.forEach((t) => {
        const display_order = jsPsych.randomization.shuffle([t.left, t.right]);
        
        timeline.push({
            type: jsPsychImageButtonResponse,
            stimulus: '',
            choices: display_order,
            button_html: '<button class="jspsych-btn"><img src="%choice%"/></button>',
            prompt: "<p>Which image is worth <b>more money</b>?</p>",
            data: { 
                task: 'choice_comparison',
                left_path: display_order[0],
                right_path: display_order[1],
                is_attention_check: t.is_attention || false,
                expected_correct_path: t.correct || null,
                comparison_type: t.comp_type || 'Attention_Check'
            },
            on_finish: function(data) {
                if (data.expected_correct_path) {
                    const chosen_path = display_order[data.response];
                    data.is_correct = (chosen_path === data.expected_correct_path);
                    data.expected_correct = (display_order[0] === data.expected_correct_path) ? 'Left' : 'Right';
                }
            }
        });
    });

    // 5. שאלת סיום חובה (Mandatory Feedback)
    timeline.push({
        type: jsPsychSurveyText,
        questions: [{
            prompt: "Did you notice any connection between Stories/Facts and the money value? Please explain (this is required to finish):",
            required: true,
            rows: 5,
            name: 'causal_feedback'
        }],
        button_label: "Finish"
    });

    jsPsych.run(timeline);
</script>
</body>
</html>
