<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 100px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
    </style>
    <title>My experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-html-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Data saved:", result.file))
    .catch(error => console.error("Error saving data:", error));
}

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

// --- הגדרת המערך הניסויי ---
var story_prefixes = ['story_1', 'story_2', 'story_3', 'story_4'];
var info_prefixes = ['info_1', 'info_2', 'info_3', 'info_4'];

// 1. הגרלת 2 מכל סוג (ללא חזרה)
var selected_story_names = jsPsych.randomization.sampleWithoutReplacement(story_prefixes, 2);
var selected_info_names = jsPsych.randomization.sampleWithoutReplacement(info_prefixes, 2);

// 2. הגרלת גרסאות (אחד a ואחד b לכל סוג)
var story_versions = jsPsych.randomization.shuffle(['a', 'b']);
var info_versions = jsPsych.randomization.shuffle(['a', 'b']);

var version_map = {};
version_map[selected_story_names[0]] = story_versions[0];
version_map[selected_story_names[1]] = story_versions[1];
version_map[selected_info_names[0]] = info_versions[0];
version_map[selected_info_names[1]] = info_versions[1];

// 3. בניית הבלוקים
var selected_blocks = [
    { name: selected_story_names[0], type: 'story', version6: story_versions[0] },
    { name: selected_story_names[1], type: 'story', version6: story_versions[1] },
    { name: selected_info_names[0], type: 'info', version6: info_versions[0] },
    { name: selected_info_names[1], type: 'info', version6: info_versions[1] }
];

// 4. הגרלת תיקיות יקרות (1 סטורי ו-1 אינפו מתוך הנבחרים)
var valuable_folders_list = [
    jsPsych.randomization.sampleWithoutReplacement(selected_story_names, 1)[0],
    jsPsych.randomization.sampleWithoutReplacement(selected_info_names, 1)[0]
];

// הדפסה לקונסול לבדיקה
console.log("Selected Blocks:", selected_blocks);
console.log("Valuable Folders:", valuable_folders_list);

var experimental_blocks = jsPsych.randomization.shuffle(selected_blocks);

jsPsych.data.addProperties({
    subject_id: subject_id,
    selected_blocks: JSON.stringify(selected_blocks),
    valuable_folders: JSON.stringify(valuable_folders_list)
});

function getImagePath(prefix, i) {
    var suffix = (i === 6) ? `6_${version_map[prefix]}` : i;
    return `images_story_vs_info/${prefix}_${suffix}.png`;
}

// Preload
timeline.push({
    type: jsPsychPreload,
    images: function() {
        var paths = ['consent_form_2022.png', 'images_story_vs_info/gray.png', 'images_story_vs_info/dollar.png'];
        selected_blocks.forEach(block => {
            for (var i = 1; i <= 6; i++) { paths.push(getImagePath(block.name, i)); }
        });
        return paths;
    }
});

// --- פתיחה והוראות ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="font-family: Arial; padding: 50px;"><h2>Welcome</h2><p>Click Next to begin.</p></div>'],
    show_clickable_nav: true
});

timeline.push({
    type: jsPsychFullscreen,
    fullscreen_mode: true
});

// --- Part 1: Observation ---
experimental_blocks.forEach(function(block) {
    // מסך שחור/לבן קצר בין סדרות
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '',
        choices: "NO_KEYS", trial_duration: 1000
    });

    for (var i = 1; i <= 6; i++) {
        var path = getImagePath(block.name, i);
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", trial_duration: 2000 
        });
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p>Is there a person in this image?</p></div></div>`,
            choices: ['Yes', 'No'],
            data: { 
                task: 'observation', 
                folder: block.name, 
                sequence_type: block.type, 
                img_idx: i,
                img_version: (i === 6 ? version_map[block.name] : 'standard')
            }
        });
    }
});

// --- Part 2: Value Learning ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<h2>Part 2: Value Learning</h2><p>Learn which images are worth money.</p>'],
    show_clickable_nav: true
});

var shuffled_part2 = jsPsych.randomization.shuffle(experimental_blocks);
shuffled_part2.forEach(function(block) {
    var is_valuable = valuable_folders_list.includes(block.name);
    var target_index = jsPsych.randomization.sampleWithReplacement([3, 4, 5], 1)[0];
    var path = getImagePath(block.name, target_index);

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p>Click to reveal value</p></div></div>`,
        choices: ['Reveal Value']
    });

    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <div class="stimulus-container" style="display: flex; align-items: center; justify-content: center; gap: 40px;">
                <img src="${path}" class="exp-image">
                <div style="text-align: center;">
                    <img src="${is_valuable ? 'images_story_vs_info/dollar.png' : 'images_story_vs_info/gray.png'}" style="width: 150px;">
                    <p style="color: ${is_valuable ? 'green' : 'grey'}; font-weight: bold; font-size: 24px;">${is_valuable ? 'WORTH MONEY' : 'NEUTRAL'}</p>
                </div>
            </div>`,
        choices: "NO_KEYS", 
        trial_duration: 4000,
        data: { task: 'value_learning', folder: block.name, sequence_type: block.type, reward: is_valuable }
    });
});

// --- Part 3: Choice ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<h2>Part 3: Final Choice</h2><p>Choose the image worth more money.</p>'],
    show_clickable_nav: true
});

experimental_blocks.forEach(function(block) {
    [1, 2].forEach(function(dist) {
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            on_start: function(trial) {
                var X = 4;
                var left = Math.random() < 0.5 ? X - dist : X + dist;
                var right = (left === X - dist) ? X + dist : X - dist;
                
                trial.data.img_left = left;
                trial.data.img_right = right;
                trial.data.img_left_path = getImagePath(block.name, left);
                trial.data.img_right_path = getImagePath(block.name, right);

                trial.stimulus = `
                    <h3>Which is worth more?</h3>
                    <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                        <img src="${trial.data.img_left_path}" class="small-image">
                        <img src="${trial.data.img_right_path}" class="small-image">
                    </div>`;
            },
            choices: ['Left', 'Right'],
            data: { 
                task: 'choice', 
                folder: block.name, 
                sequence_type: block.type,
                distance: dist,
                is_valuable_folder: valuable_folders_list.includes(block.name)
            }
        });
    });
});

timeline.push({
    type: jsPsychSurveyText,
    questions: [{prompt: 'Gender:', name: 'gender'}, {prompt: 'Age:', name: 'age'}]
});

jsPsych.run(timeline);

  </script>
</html>
