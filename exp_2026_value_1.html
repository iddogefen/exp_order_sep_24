<!DOCTYPE html>
<html>
  <head>
    <style>
      body { background-color: #f5f5f5; font-family: Arial, sans-serif; }
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; background: white; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 100px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; background: white; }
      .instruction-box { background: white; padding: 30px; border-radius: 10px; border: 1px solid #ddd; text-align: left; max-width: 800px; margin: auto; line-height: 1.6; }
    </style>
    <title>Memory & Value Experiment</title>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-survey-text.js"></script>
    <script src="jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/plugin-fullscreen.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Data saved successfully:", result.file))
    .catch(error => console.error("Error saving data:", error));
}

var timeline = [];
var main_folder = "images_story_vs_info/";

var story_prefixes = ['story_1', 'story_2', 'story_3', 'story_4'];
var info_prefixes = ['info_1', 'info_2', 'info_3', 'info_4'];
var all_prefixes = [...story_prefixes, ...info_prefixes];

// בניית רשימת Preload
var preload_images = [
    main_folder + 'consent_form_2022.png',
    main_folder + 'gray.png',
    main_folder + 'dollar.png'
];

all_prefixes.forEach(p => {
    for (var i = 1; i <= 5; i++) { preload_images.push(main_folder + p + "_" + i + ".png"); }
    preload_images.push(main_folder + p + "_6_a.png");
});

timeline.push({
    type: jsPsychPreload,
    images: preload_images,
    auto_preload: true,
    message: "Loading images, please wait...",
    continue_after_error: true
});

var valuable_list = jsPsych.randomization.sampleWithoutReplacement(story_prefixes, 2)
    .concat(jsPsych.randomization.sampleWithoutReplacement(info_prefixes, 2));

var experimental_setup = jsPsych.randomization.shuffle(all_prefixes).map(p => {
    return {
        name: p,
        type: p.includes('story') ? 'story' : 'info',
        is_valuable: valuable_list.includes(p)
    };
});

// --- הוראות והסכמה ---
timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

var consent = {
    type: jsPsychInstructions,
    pages: [
        `<div class="instruction-box">
            <h2>Consent Form</h2>
            <p>Please read the following consent form carefully before beginning the study.</p>
            <img src="${main_folder}consent_form_2022.png" style="width:100%; border:1px solid #ccc;">
         </div>`
    ],
    show_clickable_nav: true,
    button_label_next: "I Agree & Continue"
};

var overview = {
    type: jsPsychInstructions,
    pages: [
        `<div class="instruction-box">
            <h2>Experiment Overview</h2>
            <p>This experiment has three parts:</p>
            <ol>
                <li><b>Observation:</b> Watch sequences of images.</li>
                <li><b>Value Learning:</b> Learn which sequences are worth money.</li>
                <li><b>Choice:</b> Choose between images to earn a reward.</li>
            </ol>
            <p>Click "Next" to start Part 1.</p>
         </div>`
    ],
    show_clickable_nav: true
};

timeline.push(consent, overview);

// --- PART 1: OBSERVATION ---
experimental_setup.forEach(block => {
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="background:white; width:100vw; height:100vh;"></div>',
        choices: "NO_KEYS", trial_duration: 1500
    });

    for (var i = 1; i <= 6; i++) {
        var img_file = (i === 6) ? `${block.name}_6_a.png` : `${block.name}_${i}.png`;
        var path = main_folder + img_file;

        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", trial_duration: 4000
        });

        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p>Is there a person in this image?</p></div></div>`,
            choices: ['Yes', 'No'],
            data: { task: 'observation', block: block.name, img_index: i }
        });
    }
});

// --- PART 2: VALUE LEARNING ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div class="instruction-box"><h2>Part 2: Learning</h2><p>Now you will see one image from each sequence and discover if that sequence is <b>WORTH MONEY</b> (Dollar icon) or <b>NEUTRAL</b> (Gray icon).</p></div>'],
    show_clickable_nav: true
});

var learning_order = jsPsych.randomization.shuffle(experimental_setup);
learning_order.forEach(block => {
    var target_img = jsPsych.randomization.sampleWithReplacement([3, 4, 5], 1)[0];
    var path = main_folder + block.name + "_" + target_img + ".png";

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><p>Click to see the value</p></div>`,
        choices: ['Reveal Value']
    });

    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <div class="stimulus-container" style="display:flex; align-items:center; justify-content:center; gap:30px;">
                <img src="${path}" class="exp-image">
                <div style="text-align:center;">
                    <img src="${main_folder + (block.is_valuable ? 'dollar.png' : 'gray.png')}" style="width:120px;">
                    <h2 style="color:${block.is_valuable ? 'green':'gray'}">${block.is_valuable ? 'WORTH MONEY' : 'NEUTRAL'}</h2>
                </div>
            </div>`,
        choices: "NO_KEYS", trial_duration: 5000,
        data: { task: 'value_learning', block: block.name, valuable: block.is_valuable }
    });
});

// --- PART 3: CHOICE ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div class="instruction-box"><h2>Part 3: Final Choice</h2><p>Choose the image that you believe belongs to a sequence worth <b>more money</b>.</p></div>'],
    show_clickable_nav: true
});

experimental_setup.forEach(block => {
    [1, 2].forEach(dist => {
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: function() {
                var center = 4;
                var left_i = Math.random() < 0.5 ? center - dist : center + dist;
                var right_i = left_i === center - dist ? center + dist : center - dist;
                
                window.l_img = left_i; window.r_img = right_i;

                return `<div class="stimulus-container" style="display:flex; width:800px; gap:20px;">
                            <img src="${main_folder + block.name + '_' + left_i}.png" class="small-image">
                            <img src="${main_folder + block.name + '_' + right_i}.png" class="small-image">
                        </div>`;
            },
            choices: ['Left Image', 'Right Image'],
            data: function() {
                return {
                    task: 'choice',
                    block: block.name,
                    dist: dist,
                    left_idx: window.l_img,
                    right_idx: window.r_img
                };
            }
        });
    });
});

// --- סיום ודמוגרפיה ---
timeline.push({
    type: jsPsychSurveyText,
    questions: [
        {prompt: "What is your gender?", name: "gender"},
        {prompt: "What is your age?", name: "age"}
    ]
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div class="instruction-box"><h2>Completed!</h2><p>Thank you. Your completion code is: <b>DACB971D74</b>. Your data is being saved...</p></div>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);

  </script>
</html>
