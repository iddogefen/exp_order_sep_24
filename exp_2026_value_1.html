<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 100px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
      
      .transition-square { 
          width: 250px; height: 250px; margin: 0 auto; 
          display: flex; flex-direction: column; align-items: center; justify-content: center; 
          border-radius: 15px; color: white; font-family: Arial; font-size: 28px; font-weight: bold;
      }
      .bg-story { background-color: #4A90E2; } 
      .bg-info { background-color: #F5A623; }  

      .value-tag { font-size: 32px; font-weight: bold; margin-top: 20px; font-family: Arial; }
      .val-high { color: green; }
      .val-low { color: gray; }
    </style>
    <title>My experiment</title>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-survey-text.js"></script>
    <script src="jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/plugin-fullscreen.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() { saveData(jsPsych.data.get().csv()); }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .catch(error => console.error("Error saving data:", error));
}

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

// --- הגדרת סדרות ---
var all_numbers = [1, 2, 3, 4];
var shuffled_numbers = jsPsych.randomization.shuffle(all_numbers);

var story_nums = [shuffled_numbers[0], shuffled_numbers[1]];
var info_nums = [shuffled_numbers[2], shuffled_numbers[3]];

var s_val_idx = Math.random() < 0.5 ? 0 : 1;
var i_val_idx = Math.random() < 0.5 ? 0 : 1;

var story_val = { name: 'story_' + story_nums[s_val_idx], type: 'Story', is_valuable: true };
var story_neut = { name: 'story_' + story_nums[1-s_val_idx], type: 'Story', is_valuable: false };
var info_val = { name: 'info_' + info_nums[i_val_idx], type: 'Fact', is_valuable: true };
var info_neut = { name: 'info_' + info_nums[1-i_val_idx], type: 'Fact', is_valuable: false };

var all_blocks = [story_val, story_neut, info_val, info_neut];

function getImagePath(prefix, i, version = 'b') {
    return i === 6 ? `images_story_vs_info/${prefix}_6_${version}.png` : `images_story_vs_info/${prefix}_${i}.png`;
}

// Preload
timeline.push({
    type: jsPsychPreload,
    images: function() {
        var paths = ['consent_form_2022.png'];
        all_blocks.forEach(block => {
            for (var i = 1; i <= 5; i++) paths.push(getImagePath(block.name, i));
            paths.push(getImagePath(block.name, 6, 'a'));
            paths.push(getImagePath(block.name, 6, 'b'));
        });
        return paths;
    }
});

// ----------- שלב הפתיחה -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="font-family: Arial; padding: 50px; text-align: left;">' +
        '<h2>Welcome!</h2>' +
        '<p>In this study, you will see sequences of images. Some are <b>Stories</b> and some are <b>Facts</b>.</p>' +
        '<p>Please follow the instructions on each screen carefully.</p></div>'
    ],
    show_clickable_nav: true
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align:center;"><img src="consent_form_2022.png" style="max-width:80%;"></img></div>'],
    show_clickable_nav: true
});

timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

// ----------- חלק 1: צפייה -----------
var observation_order = jsPsych.randomization.shuffle(all_blocks);
observation_order.forEach(function(block) {
    var bgColor = (block.type === 'Story') ? 'bg-story' : 'bg-info';
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div class="transition-square ${bgColor}"><div>${block.type}</div></div>`,
        choices: "NO_KEYS", trial_duration: 2000 
    });

    for (var i = 1; i <= 5; i++) {
        var path = getImagePath(block.name, i, 'b');
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"></div>`,
            choices: "NO_KEYS", trial_duration: 5000 
        });
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p>Is there a person in the description or image?</p></div></div>`,
            choices: ['Yes', 'No'], trial_duration: 3000,
            data: { task: 'observation', folder: block.name, sequence_type: block.type, img_idx: i }
        });
    }
});

// ----------- חלק 2: למידה אקטיבית -----------
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align: center; padding: 50px;"><h2>Part 2: Value Discovery</h2><p>Now you will see the outcome and monetary value of each event.</p></div>'],
    show_clickable_nav: true
});

var learning_order = jsPsych.randomization.shuffle(all_blocks);
learning_order.forEach(function(block) {
    var path5 = getImagePath(block.name, 5);
    var version6 = block.is_valuable ? 'a' : 'b';
    var path6 = getImagePath(block.name, 6, version6);
    var val_text = block.is_valuable ? "$100" : "$0";

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><p>The <b>${block.type}</b> outcome is next...</p><img src="${path5}" class="exp-image"></div>`,
        choices: ['Reveal Outcome']
    });

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><img src="${path6}" class="exp-image"><div class="value-tag">Value: ${val_text}</div></div>`,
        choices: ['Next'],
        on_load: function() {
            var btn = document.querySelector('.jspsych-btn');
            btn.disabled = true;
            setTimeout(() => { btn.disabled = false; }, 4000);
        },
        data: { task: 'learning', folder: block.name, value: val_text }
    });
});

// ----------- חלק 3: בחירה סופית -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align: center; padding: 50px;">' +
        '<h2>Part 3: Final Choice</h2>' +
        '<p>Choose the image worth <b>more money</b>.</p>' +
        '<p><b>התחשבו בכך</b> אם התמונה הגיעה מתוך "סיפור" או "עובדה" בזמן שאתם בוחרים.</p></div>'
    ],
    show_clickable_nav: true
});

// הגדרת זוגות: 2 השוואות בין סוגים, ו-2 השוואות בדיקת ערנות (ערך מול ניטרלי)
var pairs = [
    { name: 'Valuable_Story_vs_Info', b1: story_val, b2: info_val, is_check: false },
    { name: 'Neutral_Story_vs_Info', b1: story_neut, b2: info_neut, is_check: false },
    { name: 'Check_Story_Val_vs_Neut', b1: story_val, b2: story_neut, is_check: true },
    { name: 'Check_Info_Val_vs_Neut', b1: info_val, b2: info_neut, is_check: true }
];

var choice_trials = [];
pairs.forEach(p => {
    var indices = p.is_check ? [3, 6] : [1, 2, 3, 4, 5, 6]; // בדיקת ערנות על תמונות נבחרות
    indices.forEach(idx => choice_trials.push({ pair: p, idx: idx }));
});

jsPsych.randomization.shuffle(choice_trials).forEach(t => {
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        on_start: function(trial) {
            var p1 = getImagePath(t.pair.b1.name, t.idx, 'b');
            var p2 = getImagePath(t.pair.b2.name, t.idx, 'b');
            var left_is_b1 = Math.random() < 0.5;
            
            trial.data.left_path = left_is_b1 ? p1 : p2;
            trial.data.right_path = left_is_b1 ? p2 : p1;
            trial.data.is_attention_check = t.pair.is_check;
            
            // הגדרת הציפייה (אמת/שקר) לבדיקת ערנות
            if(t.pair.is_check) {
                trial.data.expected_correct = left_is_b1 ? 'Left' : 'Right';
            }

            trial.stimulus = `
                <div style="font-family: Arial; margin-bottom: 20px;"><h3>Which is worth <b>more money</b>?</h3></div>
                <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                    <img src="${trial.data.left_path}" class="small-image">
                    <img src="${trial.data.right_path}" class="small-image">
                </div>`;
        },
        choices: ['Left', 'Right'],
        data: { task: 'choice', comparison: t.pair.name, img_idx: t.idx },
        on_finish: function(data) {
            if(data.is_attention_check) {
                data.is_correct = (jsPsych.pluginAPI.compareKeys(data.response, 0) && data.expected_correct === 'Left') || 
                                  (jsPsych.pluginAPI.compareKeys(data.response, 1) && data.expected_correct === 'Right');
            }
        }
    });
});

timeline.push({
    type: jsPsychSurveyText, 
    questions: [{prompt: 'On what basis did you make your choices?', name: 'strategy', rows: 5}]
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align: center;"><h2>Done! Code: DACB971D74</h2></div>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);
  </script>
</html>
