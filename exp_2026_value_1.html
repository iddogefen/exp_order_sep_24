<!DOCTYPE html>
<html>
<head>
    <style>
        .experiment-container { text-align: center; font-family: Arial; margin-top: 50px; }
        .color-box { 
            width: 200px; height: 200px; margin: 20px auto; 
            border: 5px solid #333; border-radius: 20px; 
            transition: background-color 0.3s;
        }
        .instruction-text { font-family: Arial; padding: 40px; line-height: 1.6; font-size: 20px; text-align: left; }
        .reward-text { font-size: 48px; font-weight: bold; color: green; margin-top: 20px; }
        .intervention-alert { color: #dc3545; font-weight: bold; font-size: 24px; border: 2px solid red; padding: 10px; display: inline-block; }
    </style>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
</head>
<body></body>
<script>

var jsPsych = initJsPsych({
    on_finish: function() {
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .catch(error => console.error("Error saving data:", error));
}

const TARGET_SEQUENCE = ['Blue', 'Yellow', 'Green', 'Purple'];
const COLORS = {
    'Blue': '#007bff', 'Yellow': '#ffc107', 'Green': '#28a745', 
    'Purple': '#6f42c1', 'Red': '#dc3545'
};

var timeline = [];

// 1. Instructions (English)
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div class="instruction-text"><h2>Causal Inference Task</h2>' +
        '<p>In this experiment, your goal is to discover a sequence of <b>4 colors</b> that leads to a $100 reward.</p>' +
        '<p><b>Important:</b> The reward is only granted if <u>you</u> correctly triggered the sequence from start to finish.</p>' +
        '<p>Sometimes, the system will activate itself without your input. You must determine if a reward is still expected in these cases.</p></div>'
    ],
    show_clickable_nav: true
});

function create_causal_trial(is_intervention) {
    let was_broken = is_intervention; 

    for (let step = 0; step < 4; step++) {
        if (step === 0 && is_intervention) {
            // Intervention Trial: Computer starts the sequence
            timeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `
                    <div class="experiment-container">
                        <div class="intervention-alert">The system activated automatically!</div>
                        <div class="color-box" style="background-color: ${COLORS[TARGET_SEQUENCE[0]]};"></div>
                        <p>The color <b>${TARGET_SEQUENCE[0]}</b> appeared without your choice.</p>
                    </div>`,
                choices: ['Continue'],
                data: { trial_type: 'computer_intervention', step: step }
            });
        } else {
            // Normal Choice Trial
            timeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `<div class="experiment-container"><h3>Step ${step + 1} of 4</h3><p>Select a button:</p></div>`,
                choices: ['Option A', 'Option B'],
                on_finish: function(data) {
                    let correct = (data.response === 0);
                    data.revealed_color = correct ? TARGET_SEQUENCE[step] : 'Red';
                    data.is_correct = correct;
                    data.trial_type = 'user_choice';
                    if (!correct) was_broken = true;
                }
            });

            timeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: function() {
                    let last_data = jsPsych.data.get().last(1).values()[0];
                    return `
                        <div class="experiment-container">
                            <div class="color-box" style="background-color: ${COLORS[last_data.revealed_color]};"></div>
                            <p>Revealed: <b>${last_data.revealed_color}</b></p>
                        </div>`;
                },
                choices: ['Next'],
                trial_duration: 1200
            });
        }
    }

    // Causal Judgment - Check if user understands the mechanism
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="experiment-container"><h2>End of Sequence</h2><p>Do you believe you will receive $100 now?</p></div>`,
        choices: ['Yes, Reward Expected', 'No, Sequence Interrupted'],
        on_finish: function(data) {
            // Logic: if was_broken is true, the correct answer is "No" (index 1)
            data.correct_causal_judgment = (data.response === (was_broken ? 1 : 0));
        }
    });

    // Final Outcome Feedback
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
            if (!was_broken) {
                return '<div class="experiment-container"><div class="reward-text">$100 🎉</div><p>Your actions caused the outcome!</p></div>';
            } else {
                return '<div class="experiment-container"><div class="reward-text" style="color:gray;">$0</div><p>The causal chain was not completed by you.</p></div>';
            }
        },
        choices: ['Next Round'],
        trial_duration: 2000
    });
}

// Build Experiment: 6 Choice trials and 4 Intervention trials
let trial_types = [false, false, false, false, false, false, true, true, true, true];
jsPsych.randomization.shuffle(trial_types).forEach(type => {
    create_causal_trial(type);
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div class="experiment-container"><h2>Task Completed</h2><p>Thank you for your participation!</p></div>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);

</script>
</html>
