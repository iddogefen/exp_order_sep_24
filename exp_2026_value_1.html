<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image {
          width: 500px;
          height: 400px; 
          object-fit: contain; 
          border: 2px solid #ccc;
          display: block;
          margin: 0 auto;
      }
      .stimulus-container {
          width: 600px;
          margin: 0 auto;
          text-align: center;
      }
      .question-area {
          height: 100px;
          display: flex;
          align-items: center;
          justify-content: center;
      }
      .small-image {
          width: 350px; 
          height: 280px; 
          object-fit: contain;
          border: 2px solid #ccc;
      }
    </style>
    <title>Psychology Experiment</title>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-survey-text.js"></script>
    <script src="jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/plugin-fullscreen.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        // פונקציה לשמירת הנתונים בסיום
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Data saved:", result.file))
    .catch(error => console.error("Error saving data:", error));
}

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

jsPsych.data.addProperties({
    subject_id: jsPsych.data.getURLVariable('participantId') || subject_id,
});

// --- הגדרת שמות הסדרות ---
var story_prefixes = ['story_1', 'story_2', 'story_3', 'story_4'];
var info_prefixes = ['info_1', 'info_2', 'info_3', 'info_4'];

// הגרלה של גרסה a או b עבור התמונה השישית (לפי הלוגיקה שלך)
var version_map = {};
[...story_prefixes, ...info_prefixes].forEach(p => {
    version_map[p] = Math.random() < 0.5 ? 'a' : 'b';
});

// פונקציית הנתיב המרכזית - שולפת ישירות מהתיקייה ללא תתי-תיקיות
function getImagePath(prefix, i) {
    var suffix = (i === 6) ? `6_${version_map[prefix]}` : i;
    return `images_story_vs_info/${prefix}_${suffix}.png`;
}

// הגדרת הבלוקים וערכם הכספי
var n_valuable_per_type = 2; 
var sampled_story = jsPsych.randomization.shuffle(story_prefixes);
var sampled_info = jsPsych.randomization.shuffle(info_prefixes);
var valuable_folders_list = [
    ...jsPsych.randomization.sampleWithoutReplacement(sampled_story, n_valuable_per_type),
    ...jsPsych.randomization.sampleWithoutReplacement(sampled_info, n_valuable_per_type)
];

var selected_blocks = [
    ...sampled_story.map(f => ({ name: f, type: 'story' })),
    ...sampled_info.map(f => ({ name: f, type: 'info' }))
];

var experimental_blocks = jsPsych.randomization.shuffle(selected_blocks);

// Preload: טעינת כל הנכסים מראש מהתיקייה המרכזית
function generateAllImages() {
    var paths = [
        'images_story_vs_info/consent_form_2022.png', 
        'images_story_vs_info/gray.png', 
        'images_story_vs_info/dollar.png'
    ];
    selected_blocks.forEach(block => {
        for (var i = 1; i <= 6; i++) {
            paths.push(getImagePath(block.name, i));
        }
    });
    return paths;
}

timeline.push({
    type: jsPsychPreload,
    images: generateAllImages(),
    continue_after_error: true
});

// ----------- הוראות וחתימה -----------
var trial_consent = {
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align:center; font-family:Arial; padding-top:20px;">' +
        '<p>Please carefully read the consent form below.</p>' +
        '<img src="images_story_vs_info/consent_form_2022.png" style="max-width:80%; border:1px solid #000;"></img>' +
        '</div>'
    ],
    show_clickable_nav: true
};

var trial_fullscreen = { type: jsPsychFullscreen, fullscreen_mode: true };

timeline.push(trial_consent, trial_fullscreen);

// ----------- שלב 1: צפייה ומשימת הסחת דעת -----------
experimental_blocks.forEach(function(block) {
    // מסך לבן קצר בין סדרות
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="background-color: white; width: 100vw; height: 100vh;"></div>',
        choices: "NO_KEYS", trial_duration: 2000
    });

    for (var i = 1; i <= 6; i++) {
        var path = getImagePath(block.name, i);
        // הצגת התמונה ל-5 שניות
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", trial_duration: 5000 
        });
        // שאלה על התמונה (Disruption Task)
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold;">Is there a person in this image?</p></div></div>`,
            choices: ['Yes', 'No'],
            trial_duration: 3000,
            data: { task: 'observation', folder: block.name, sequence_type: block.type, img_idx: i }
        });
    }
});

// ----------- שלב 2: למידת ערך (Value Learning) -----------
var part2_intro = {
    type: jsPsychInstructions,
    pages: ['<div style="text-align:center; padding:50px;"><h2>Part 2: Value Learning</h2><p>Click Next to begin learning the values of the images.</p></div>'],
    show_clickable_nav: true
};
timeline.push(part2_intro);

var shuffled_part2 = jsPsych.randomization.shuffle(experimental_blocks);
shuffled_part2.forEach(function(block) {
    var is_valuable = valuable_folders_list.includes(block.name);
    var target_index = jsPsych.randomization.sampleWithReplacement([3, 4, 5], 1)[0];
    var path = getImagePath(block.name, target_index);

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold;">Click to reveal the image value</p></div></div>`,
        choices: ['Reveal Value']
    });

    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <div class="stimulus-container" style="display: flex; align-items: center; justify-content: center; gap: 40px;">
                <img src="${path}" class="exp-image">
                <div style="text-align: center;">
                    <img src="images_story_vs_info/${is_valuable ? 'dollar.png' : 'gray.png'}" style="width: 150px; height: 150px; border: 5px solid ${is_valuable ? 'green' : 'grey'}; border-radius: 15px;">
                    <p style="color: ${is_valuable ? 'green' : 'grey'}; font-weight: bold; font-size: 28px; margin-top: 15px;">${is_valuable ? 'WORTH MONEY' : 'NEUTRAL VALUE'}</p>
                </div>
            </div>`,
        choices: "NO_KEYS", trial_duration: 6000,
        data: { task: 'value_learning', folder: block.name, sequence_type: block.type, reward: is_valuable }
    });
});

// ----------- שלב 3: בחירה סופית (Generalization) -----------
var part3_intro = {
    type: jsPsychInstructions,
    pages: ['<div style="text-align:center; padding:50px;"><h2>Part 3: Final Choice</h2><p>Choose the image you think is worth more money.</p></div>'],
    show_clickable_nav: true
};
timeline.push(part3_intro);

experimental_blocks.forEach(function(block) {
    [1, 2].forEach(function(dist) {
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: function() {
                var X = 4;
                var left_idx = Math.random() < 0.5 ? X - dist : X + dist;
                var right_idx = (left_idx === X - dist) ? X + dist : X - dist;
                window.last_left = left_idx;
                window.last_right = right_idx;
                
                return `<div style="font-family: Arial; margin-bottom: 20px;"><h3>Which image is worth <b>more money</b>?</h3></div>
                        <div class="stimulus-container" style="display: flex; width: 800px; justify-content: center; gap: 30px;">
                            <img src="${getImagePath(block.name, left_idx)}" class="small-image">
                            <img src="${getImagePath(block.name, right_idx)}" class="small-image">
                        </div>`;
            },
            choices: ['Left', 'Right'],
            data: function() {
                return { 
                    task: 'choice', 
                    folder: block.name, 
                    img_left: window.last_left, 
                    img_right: window.last_right 
                };
            }
        });
    });
});

// דמוגרפיה וסיום
timeline.push({
    type: jsPsychSurveyText, 
    questions: [{prompt: 'Gender:', name: 'gender'}, {prompt: 'Age:', name: 'age'}]
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<span style="font-size: 24px">Experiment Finished. Your Code: DACB971D74</span>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);

  </script>
</html>
