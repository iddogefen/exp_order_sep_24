<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 100px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
      .transition-square { 
          width: 200px; 
          height: 200px; 
          background-color: #add8e6; 
          margin: 0 auto; 
          display: flex;
          align-items: center;
          justify-content: center;
      }
      .value-tag { font-size: 32px; font-weight: bold; margin-top: 20px; font-family: Arial; }
      .val-high { color: green; }
      .val-low { color: gray; }
    </style>
    <title>My experiment</title>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-survey-text.js"></script>
    <script src="jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/plugin-fullscreen.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Data saved:", result.file))
    .catch(error => console.error("Error saving data:", error));
}

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

// --- הגדרת סדרות (גרסה b בלבד) ---
var all_numbers = [1, 2, 3, 4];
var shuffled_numbers = jsPsych.randomization.shuffle(all_numbers);

var story_nums = [shuffled_numbers[0], shuffled_numbers[1]];
var info_nums = [shuffled_numbers[2], shuffled_numbers[3]];

var s_val_idx = Math.random() < 0.5 ? 0 : 1;
var i_val_idx = Math.random() < 0.5 ? 0 : 1;

var story_val, story_neut, info_val, info_neut;

var all_blocks = [
    { name: 'story_' + story_nums[0], type: 'story', is_valuable: (s_val_idx === 0) },
    { name: 'story_' + story_nums[1], type: 'story', is_valuable: (s_val_idx === 1) },
    { name: 'info_' + info_nums[0], type: 'info', is_valuable: (i_val_idx === 0) },
    { name: 'info_' + info_nums[1], type: 'info', is_valuable: (i_val_idx === 1) }
];

all_blocks.forEach(b => {
    if(b.type === 'story') {
        if(b.is_valuable) story_val = b; else story_neut = b;
    } else {
        if(b.is_valuable) info_val = b; else info_neut = b;
    }
});

function getImagePath(prefix, i) {
    var suffix = (i === 6) ? `6_b` : i;
    return `images_story_vs_info/${prefix}_${suffix}.png`;
}

// Preload
timeline.push({
    type: jsPsychPreload,
    images: function() {
        var paths = ['consent_form_2022.png'];
        all_blocks.forEach(block => {
            for (var i = 1; i <= 6; i++) { paths.push(getImagePath(block.name, i)); }
        });
        return paths;
    }
});

// ----------- שלב הפתיחה -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="font-family: Arial; padding: 100px; padding-top: 5%; text-align: left;">' +
        '<h2>Thank you for participating in this experiment!</h2>' +
        '<p>By clicking the "Begin Study" button, you will be taken to the study, including complete instructions and an informed consent agreement.</p></div>'
    ],
    show_clickable_nav: true
});

timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align:center; font-family:Arial; font-size: 22px; padding-top:20px;">' +
        '<p>Please carefully read the consent form below before proceeding.</p>' +
        '<img src="consent_form_2022.png" style="max-width:80%; padding:20px;"></img></div>'
    ],
    show_clickable_nav: true
});

timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="font-family: Arial; text-align: left; padding: 50px; line-height: 1.6;">' +
        '<h2>Experiment Overview</h2>' +
        '<p>In this experiment, you will view a series of images depicting different events.</p>' +
        '<p><b>Please read the text carefully and then answer if there is a person in the description or image.</b></p>' +
        '<p>Follow your intuition and click "Next" to begin Part 1.</p></div>'
    ],
    show_clickable_nav: true
});

// ----------- חלק 1: צפייה -----------
var observation_order = jsPsych.randomization.shuffle(all_blocks);

observation_order.forEach(function(block) {
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div class="transition-square"></div>',
        choices: "NO_KEYS", 
        trial_duration: 2000 
    });

    for (var i = 1; i <= 6; i++) {
        var path = getImagePath(block.name, i);
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", 
            trial_duration: 5000 
        });
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold; margin: 0;">Is there a person in this image?</p></div></div>`,
            choices: ['Yes', 'No'],
            trial_duration: 3000,
            data: { task: 'observation', folder: block.name, sequence_type: block.type, img_idx: i }
        });
    }
});

// ----------- חלק 2: למידה אקטיבית -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align: center; padding: 50px; font-family: Arial;">' +
        '<h2>Part 2: Value Discovery</h2>' +
        '<p>You will now see some images again.</p>' +
        '<p>For each image, you must <b>click the button to reveal its monetary value</b>.</p>' +
        '<p>Try to remember the value of each image type.</p></div>'
    ],
    show_clickable_nav: true
});

// הגרלת תמונה X שתמיד תהיה 3 או 4 כדי לאפשר מרווח של +/- 2 (בתוך הטווח 1-6)
var learning_X = jsPsych.randomization.sampleWithoutReplacement([3, 4], 1)[0];
var learning_order = jsPsych.randomization.shuffle(all_blocks);

learning_order.forEach(function(block) {
    var path = getImagePath(block.name, learning_X);
    var val_text = block.is_valuable ? "$100" : "$0";
    var val_class = block.is_valuable ? "val-high" : "val-low";

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><p style="font-family:Arial; font-size:20px;">How much is this image worth?</p><img src="${path}" class="exp-image"><div class="value-tag">???</div></div>`,
        choices: ['Click to reveal value']
    });

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<div class="stimulus-container"><p style="font-family:Arial; font-size:20px;">Remember this value:</p><img src="${path}" class="exp-image"><div class="value-tag ${val_class}">This image is worth: ${val_text}</div></div>`,
        choices: ['Next'],
        on_load: function() {
            var btn = document.querySelector('.jspsych-btn');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            setTimeout(function() {
                btn.disabled = false;
                btn.style.opacity = '1';
            }, 6000);
        },
        data: { task: 'learning', folder: block.name, learned_X: learning_X, value: val_text }
    });
});

// ----------- חלק 3: בחירה -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align: center; padding: 50px; font-family: Arial;">' +
        '<h2>Part 3: Final Choice</h2>' +
        '<p><b>Now you will see different images, try to think about their relation to the image with the value of 100 or 0 that you saw in the previous stage and based on that, evaluate which of the two images is worth more.</b></p>' +
        '<p>A correct evaluation of the images will lead to a <b>monetary reward</b>.</p></div>'
    ],
    show_clickable_nav: true
});

var comparison_pairs = [
    { name: 'Valuable_Story_vs_Info', b1: story_val, b2: info_val },
    { name: 'Neutral_Story_vs_Info', b1: story_neut, b2: info_neut }
];

var choice_trials = [];
comparison_pairs.forEach(function(pair) {
    // השוואות X-2, X-1, X+1, X+2
    [learning_X - 2, learning_X - 1, learning_X + 1, learning_X + 2].forEach(function(offset_idx) {
        // וודא שאנחנו בטווח התמונות הקיים (1-6)
        if (offset_idx >= 1 && offset_idx <= 6) {
            choice_trials.push({ pair: pair, idx: offset_idx });
        }
    });
});

jsPsych.randomization.shuffle(choice_trials).forEach(function(t) {
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        on_start: function(trial) {
            var p1 = getImagePath(t.pair.b1.name, t.idx);
            var p2 = getImagePath(t.pair.b2.name, t.idx);
            var left_is_story = Math.random() < 0.5;
            trial.data.left_path = left_is_story ? p1 : p2;
            trial.data.right_path = left_is_story ? p2 : p1;

            trial.stimulus = `
                <div style="font-family: Arial; margin-bottom: 20px;"><h3>Which image is worth <b>more money</b>?</h3></div>
                <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                    <img src="${trial.data.left_path}" class="small-image">
                    <img src="${trial.data.right_path}" class="small-image">
                </div>`;
        },
        choices: ['Left', 'Right'],
        data: { task: 'choice', comp_type: t.pair.name, img_idx: t.idx, learned_X: learning_X }
    });
});

// ----------- שאלון סופי -----------
timeline.push({
    type: jsPsychSurveyText, 
    questions: [
        {prompt: '<div style="font-family: Arial; font-size: 18px; margin-bottom: 10px;">On what basis did you make your choices? What was your strategy?</div>', name: 'choice_strategy', rows: 5, columns: 60},
        {prompt: 'Please insert your gender', name: 'gender'},
        {prompt: 'Please insert your age', name: 'age'}
    ]
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align: center;"><span style="font-size: 24px">You have completed the experiment. Code: DACB971D74</span></div>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);

  </script>
</html>
