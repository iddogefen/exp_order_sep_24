<!DOCTYPE html>
<html>
  <head>
    <style>
      .exp-image { width: 500px; height: 400px; object-fit: contain; border: 2px solid #ccc; display: block; margin: 0 auto; }
      .stimulus-container { width: 600px; margin: 0 auto; text-align: center; }
      .question-area { height: 100px; display: flex; align-items: center; justify-content: center; }
      .small-image { width: 350px; height: 280px; object-fit: contain; border: 2px solid #ccc; }
      /* עיצוב הריבוע התכלת למעבר */
      .transition-square { 
          width: 200px; 
          height: 200px; 
          background-color: #add8e6; 
          margin: 0 auto; 
          display: flex;
          align-items: center;
          justify-content: center;
      }
    </style>
    <title>My experiment</title>
    <script src="jspsych/plugins/jspsych.js"></script>
    <script src="jspsych/plugins/plugin-instructions.js"></script>
    <script src="jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="jspsych/plugins/plugin-survey-text.js"></script>
    <script src="jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/plugin-fullscreen.js"></script>
    <script src="jspsych/plugins/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/css/jspsych.css">
  </head>
  <body></body>
  <script>

var jsPsych = initJsPsych({
    on_finish: function() {
        saveData(jsPsych.data.get().csv());
    }
});

function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Data saved:", result.file))
    .catch(error => console.error("Error saving data:", error));
}

var subject_id = jsPsych.randomization.randomID(15);
var timeline = [];

// --- הגרלת סדרות ייחודיות ואיזון (A=Valuable, B=Neutral) ---
var all_numbers = [1, 2, 3, 4];
var shuffled_numbers = jsPsych.randomization.shuffle(all_numbers);

var story_nums = [shuffled_numbers[0], shuffled_numbers[1]];
var info_nums = [shuffled_numbers[2], shuffled_numbers[3]];

var s_versions = jsPsych.randomization.shuffle(['a', 'b']);
var i_versions = jsPsych.randomization.shuffle(['a', 'b']);

var version_map = {};
version_map['story_' + story_nums[0]] = s_versions[0];
version_map['story_' + story_nums[1]] = s_versions[1];
version_map['info_' + info_nums[0]] = i_versions[0];
version_map['info_' + info_nums[1]] = i_versions[1];

var story_val, story_neut, info_val, info_neut;

var all_blocks = [
    { name: 'story_' + story_nums[0], type: 'story', is_valuable: (s_versions[0] === 'a') },
    { name: 'story_' + story_nums[1], type: 'story', is_valuable: (s_versions[1] === 'a') },
    { name: 'info_' + info_nums[0], type: 'info', is_valuable: (i_versions[0] === 'a') },
    { name: 'info_' + info_nums[1], type: 'info', is_valuable: (i_versions[1] === 'a') }
];

all_blocks.forEach(b => {
    if(b.type === 'story') {
        if(b.is_valuable) story_val = b; else story_neut = b;
    } else {
        if(b.is_valuable) info_val = b; else info_neut = b;
    }
});

function getImagePath(prefix, i) {
    var suffix = (i === 6) ? `6_${version_map[prefix]}` : i;
    return `images_story_vs_info/${prefix}_${suffix}.png`;
}

// Preload
timeline.push({
    type: jsPsychPreload,
    images: function() {
        var paths = ['consent_form_2022.png'];
        all_blocks.forEach(block => {
            for (var i = 1; i <= 6; i++) { paths.push(getImagePath(block.name, i)); }
        });
        return paths;
    }
});

// ----------- שלב הפתיחה (הוראות מקוריות) -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="font-family: Arial; padding: 100px; padding-top: 5%; text-align: left;">' +
        '<h2>Thank you for participating in this experiment!</h2>' +
        '<p>By clicking the "Begin Study" button, you will be taken to the study, including complete instructions and an informed consent agreement.</p></div>'
    ],
    show_clickable_nav: true
});

timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align:center; font-family:Arial; font-size: 22px; padding-top:20px;">' +
        '<p>Please carefully read the consent form below before proceeding.</p>' +
        '<img src="consent_form_2022.png" style="max-width:80%; padding:20px;"></img></div>'
    ],
    show_clickable_nav: true
});

timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="font-family: Arial; text-align: left; padding: 50px; line-height: 1.6;">' +
        '<h2>Experiment Overview</h2>' +
        '<p>In this experiment, you will view a series of images depicting different events.</p>' +
        '<p>Please pay close attention to the images as they appear on the screen. You will be asked simple questions about them during the process.</p>' +
        '<p>Follow your intuition and click "Next" to begin Part 1.</p></div>'
    ],
    show_clickable_nav: true
});

// ----------- חלק 1: צפייה (בסדר רנדומלי עם ריבוע תכלת) -----------
var observation_order = jsPsych.randomization.shuffle(all_blocks);

observation_order.forEach(function(block) {
    // מסך מעבר - ריבוע תכלת
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div class="transition-square"></div>',
        choices: "NO_KEYS", 
        trial_duration: 2000 
    });

    for (var i = 1; i <= 6; i++) {
        var path = getImagePath(block.name, i);
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", 
            trial_duration: 5000 
        });
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"><p style="font-size: 20px; font-weight: bold; margin: 0;">Is there a person in this image?</p></div></div>`,
            choices: ['Yes', 'No'],
            trial_duration: 3000,
            data: { task: 'observation', folder: block.name, sequence_type: block.type, img_idx: i }
        });
    }
});

// ----------- הוראות חלק 2 (מופיעות רק כאן) -----------
timeline.push({
    type: jsPsychInstructions,
    pages: [
        '<div style="text-align: center; padding: 50px; font-family: Arial;">' +
        '<h2>Part 2: Final Choice</h2>' +
        '<p>In this final part, you will be shown pairs of images that you saw earlier.</p>' +
        '<p>Based on your impression of the events, please choose the image which you think is worth <b>more money</b>.</p>' +
        '<p>A correct evaluation of the images will lead to a <b>monetary reward</b>.</p></div>'
    ],
    show_clickable_nav: true
});

// ----------- חלק 2: בחירה (4 בחירות לזוג: 6 קבוע + 3 רנדומליות) -----------
var comparison_pairs = [
    { name: 'Valuable_Story_vs_Info', block1: story_val, block2: info_val },
    { name: 'Neutral_Story_vs_Info', block1: story_neut, block2: info_neut }
];

var all_choice_trials = [];

comparison_pairs.forEach(function(pair) {
    // הוספת כל האינדקסים 1-6 לכל זוג השוואה
    [1, 2, 3, 4, 5, 6].forEach(function(idx) {
        all_choice_trials.push({ pair: pair, idx: idx });
    });
});

// ערבוב כלל 12 הבחירות
jsPsych.randomization.shuffle(all_choice_trials).forEach(function(trial_info) {
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        on_start: function(trial) {
            var path1 = getImagePath(trial_info.pair.block1.name, trial_info.idx);
            var path2 = getImagePath(trial_info.pair.block2.name, trial_info.idx);
            
            var left_is_block1 = Math.random() < 0.5;
            trial.data.left_img_path = left_is_block1 ? path1 : path2;
            trial.data.right_img_path = left_is_block1 ? path2 : path1;

            trial.stimulus = `
                <div style="font-family: Arial; margin-bottom: 20px;"><h3>Which image is worth <b>more money</b>?</h3></div>
                <div class="stimulus-container" style="display: flex; flex-direction: row; width: 800px; justify-content: center; gap: 30px;">
                    <img src="${trial.data.left_img_path}" class="small-image">
                    <img src="${trial.data.right_img_path}" class="small-image">
                </div>`;
        },
        choices: ['Left', 'Right'],
        data: { 
            task: 'choice_comparison', 
            comparison_type: trial_info.pair.name,
            img_index: trial_info.idx,
            block_story: trial_info.pair.block1.name,
            block_info: trial_info.pair.block2.name
        }
    });
});

// ----------- שאלת אסטרטגיה ודמוגרפיה -----------
timeline.push({
    type: jsPsychSurveyText, 
    questions: [
        {
            prompt: '<div style="font-family: Arial; font-size: 18px; margin-bottom: 10px;">' +
                    'In the previous part, you had to choose which image is worth more money. ' +
                    '<b>On what basis did you make your choices? What was your strategy?</b></div>', 
            name: 'choice_strategy', 
            rows: 5, 
            columns: 60
        },
        {prompt: 'Please insert your gender', name: 'gender'},
        {prompt: 'Please insert your age', name: 'age'}
    ]
});

timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align: center;"><span style="font-size: 24px">You have completed the experiment. Code: DACB971D74</span></div>'],
    show_clickable_nav: true
});

jsPsych.run(timeline);

  </script>
</html>
