<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Memory & Value Generalization Experiment</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-instructions.js"></script>
    <script src="jspsych/plugin-html-button-response.js"></script>
    <script src="jspsych/plugin-survey-text.js"></script>
    <script src="jspsych/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugin-fullscreen.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <link rel="stylesheet" href="jspsych/jspsych.css">
    <style>
        body { background-color: #f5f5f5; }
        .exp-image { width: 500px; height: 400px; object-fit: contain; border: 3px solid #333; border-radius: 8px; display: block; margin: 0 auto; background-color: white; }
        .stimulus-container { width: 1100px; margin: 0 auto; text-align: center; }
        .question-area { height: 100px; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; font-size: 22px; }
        .reward-box { font-size: 40px; font-weight: bold; padding: 30px; border-radius: 15px; border: 6px solid; min-width: 200px; text-align: center; }
    </style>
</head>
<body></body>
<script>

// --- אתחול jsPsych ---
var jsPsych = initJsPsych({
    on_finish: function() {
        var final_data = jsPsych.data.get();
        saveData(final_data.csv());
    }
});

// פונקציית שמירה
function saveData(data) {
    fetch('write_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filedata: data })
    })
    .then(response => response.json())
    .then(result => console.log("Success! Data saved to: ", result.file))
    .catch(error => console.error("Error saving data:", error));
}

// --- הגדרות תיקיות (24 סדרות סה"כ) ---
var causal_folders = ['coin_causal', 'dog_causal', 'museum_causal', 'package_causal', 'saving_a_cat_causal', 'the_performance_causal'];
var schematic_folders = ['dinner_party_scheme', 'flight_scheme', 'hotel_scheme', 'interview_scheme', 'restaurant_scheme', 'supermarket_scheme'];
var semantic_folders = [
    'cat_care_semantic', 'creative_activities_semantic', 'exploring_nature_semantic', 'housework_semantic', 
    'kitchen_operations_semantic', 'maintaining_a_car_semantic', 'market_semantic', 'physical_activity_semantic', 
    'redecorating_a_house_semantic', 'self_care_activities_semantic', 'using_technology_semantic', 'visiting_cities_semantic'
];

var all_folders = [...causal_folders, ...schematic_folders, ...semantic_folders];

// --- הגרלת תגמולים (12 יקירות, 12 ניטרליות) ---
var valuable_causal = jsPsych.randomization.sampleWithoutReplacement(causal_folders, 3);
var valuable_schematic = jsPsych.randomization.sampleWithoutReplacement(schematic_folders, 3);
var valuable_semantic = jsPsych.randomization.sampleWithoutReplacement(semantic_folders, 6);

var all_valuable = [...valuable_causal, ...valuable_schematic, ...valuable_semantic];

// לוג לקונסול למעקב חוקר
console.log("%c--- EXPERIMENT CONFIG ---", "color: blue; font-weight: bold; font-size: 16px;");
console.log("%cVALUABLE ($1):", "color: green; font-weight: bold;", all_valuable);
console.log("%cNEUTRAL:", "color: gray; font-weight: bold;", all_folders.filter(f => !all_valuable.includes(f)));

// פונקציות עזר
function getImagePath(folder, index) {
    var type = causal_folders.includes(folder) ? 'causal_sequence' : 
               schematic_folders.includes(folder) ? 'schematic_sequence' : 'semantic_sequence';
    var suffix = (index === 10) ? "ten" : index;
    return `images/${type}/${folder}/${folder}_${suffix}.png`;
}

function checkIsValuable(folder) {
    return all_valuable.includes(folder);
}

// --- PRELOAD ---
var preload_images = ['consent_form_2022.png'];
all_folders.forEach(f => {
    for (var i = 1; i <= 9; i++) preload_images.push(getImagePath(f, i));
    preload_images.push(getImagePath(f, 10));
});

var timeline = [];

timeline.push({
    type: jsPsychPreload,
    images: preload_images,
    message: "Loading assets, please wait...",
    continue_after_error: true
});

timeline.push({ type: jsPsychFullscreen, fullscreen_mode: true });

// --- PART 1: FAMILIARIZATION ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align:left;"><h2>Part 1: Observation</h2><p>You will see 24 different sequences of events.</p><p>After each image, we will ask if there was a <b>person</b> in the image.</p></div>'],
    show_clickable_nav: true
});

var p1_folders = jsPsych.randomization.shuffle(all_folders);

p1_folders.forEach(folder => {
    console.log(`Setting up Part 1 for: ${folder}`);
    
    // מסך הפרדה אפור
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="background-color:gray; width:100vw; height:100vh;"></div>',
        choices: "NO_KEYS", trial_duration: 800
    });

    for (var i = 1; i <= 10; i++) {
        var path = getImagePath(folder, i);
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area"></div></div>`,
            choices: "NO_KEYS", trial_duration: 3500 // מהירות צפייה
        });

        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="stimulus-container"><img src="${path}" class="exp-image"><div class="question-area">Was there a person in this image?</div></div>`,
            choices: ['Yes', 'No'],
            data: { task: 'p1_viewing', folder: folder, img_idx: i }
        });
    }
});

// --- PART 2: VALUE LEARNING ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align:left;"><h2>Part 2: Value Learning</h2><p>Now you will see one specific image from each sequence.</p><p>Some are <b>VALUABLE ($1)</b> and some are <b>NEUTRAL</b>.</p><p>Pay close attention!</p></div>'],
    show_clickable_nav: true
});

var p2_folders = jsPsych.randomization.shuffle(all_folders);

p2_folders.forEach(folder => {
    var is_valuable = checkIsValuable(folder);
    var reward_text = is_valuable ? "WORTH<br>$1" : "NEUTRAL<br>VALUE";
    var color = is_valuable ? "#2ecc71" : "#95a5a6"; // ירוק או אפור
    var val_idx = jsPsych.randomization.sampleWithReplacement([3, 4, 5, 6, 7], 1)[0];
    var path = getImagePath(folder, val_idx);

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div class="stimulus-container" style="display: flex; align-items: center; justify-content: center; gap: 50px;">
                <img src="${path}" class="exp-image">
                <div class="reward-box" style="color: ${color}; border-color: ${color}; background-color: white;">${reward_text}</div>
            </div>
            <div class="question-area">Was there a person in this image?</div>`,
        choices: ['Yes', 'No'],
        data: { task: 'p2_learning', folder: folder, val_idx: val_idx, is_valuable: is_valuable }
    });
});

// --- PART 3: GENERALIZATION TEST ---
timeline.push({
    type: jsPsychInstructions,
    pages: ['<div style="text-align:left;"><h2>Part 3: Decision Task</h2><p>We will show you two images from the same sequence.</p><p>Choose the one you think is <b>more valuable</b>.</p><p>Correct choices will add to your real bonus!</p></div>'],
    show_clickable_nav: true
});

var p3_folders = jsPsych.randomization.shuffle(all_folders);

p3_folders.forEach(folder => {
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
            var lrn_data = jsPsych.data.get().filter({task: 'p2_learning', folder: folder}).values()[0];
            var X = lrn_data.val_idx;
            var is_left_smaller = (folder.length % 2 === 0);
            var left_idx = is_left_smaller ? X - 1 : X + 1;
            var right_idx = is_left_smaller ? X + 1 : X - 1;

            return `
                <div style="margin-bottom:30px; font-family:Arial;"><h3>Which image is more valuable?</h3></div>
                <div class="stimulus-container" style="display: flex; justify-content: center; gap: 60px;">
                    <div style="text-align:center;"><img src="${getImagePath(folder, left_idx)}" class="exp-image"><p><b>Press Left</b></p></div>
                    <div style="text-align:center;"><img src="${getImagePath(folder, right_idx)}" class="exp-image"><p><b>Press Right</b></p></div>
                </div>`;
        },
        choices: ['Left', 'Right'],
        on_finish: function(data) {
            var lrn_data = jsPsych.data.get().filter({task: 'p2_learning', folder: folder}).values()[0];
            var X = lrn_data.val_idx;
            var is_valuable = lrn_data.is_valuable;
            var is_left_smaller = (folder.length % 2 === 0);
            
            var left_idx = is_left_smaller ? X - 1 : X + 1;
            var right_idx = is_left_smaller ? X + 1 : X - 1;
            var chosen_idx = (data.response === 0) ? left_idx : right_idx;

            data.task = 'p3_choice';
            data.folder = folder;
            data.valuable_X = X;
            data.is_sequence_valuable = is_valuable;
            data.chosen_idx = chosen_idx;
            // חישוב הצלחה: בחר בתמונה היחידה/נכונה בסדרה יקרה (כאן הלוגיקה תלויה בך, נניח שהם אמורים לבחור ב-X)
            data.is_correct = (is_valuable && Math.abs(chosen_idx - X) === 1); 
        }
    });
});

// --- DEMOGRAPHICS & BONUS SUMMARY ---
var trial_demographics = {
    type: jsPsychSurveyText,
    questions: [
        {prompt: 'Gender:', name: 'gender'},
        {prompt: 'Age:', name: 'age'},
        {prompt: 'How did you decide which image was more valuable?', name: 'strategy', rows: 3}
    ],
    on_finish: function() {
        // חישוב בונוס סופי לתצוגה
        var correct_choices = jsPsych.data.get().filter({task: 'p3_choice', is_sequence_valuable: true}).values().length;
        jsPsych.data.addProperties({total_bonus: correct_choices});
    }
};
timeline.push(trial_demographics);

// סיום
timeline.push({
    type: jsPsychInstructions,
    pages: function() {
        var bonus = jsPsych.data.get().select('total_bonus').values[0] || 0;
        return [
            `<div style="text-align:center;">
                <h2>Experiment Completed!</h2>
                <p style="font-size:24px; color: green;">Your estimated bonus based on correct choices: <b>$${bonus}</b></p>
                <p>Please copy your completion code: <b>DACB971D74</b></p>
                <p>Click "Next" to save and exit.</p>
            </div>`
        ];
    },
    show_clickable_nav: true
});

jsPsych.run(timeline);

</script>
</html>
